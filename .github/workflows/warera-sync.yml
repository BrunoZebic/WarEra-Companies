name: Warera Sync

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: warera-sync
  cancel-in-progress: false

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger protected sync route until snapshot completes
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

          sync_deadline=$(( $(date +%s) + 660 ))
          attempt=0

          while [ "$(date +%s)" -lt "$sync_deadline" ]; do
            attempt=$((attempt + 1))

            response=$(curl --show-error --silent --fail-with-body \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              "${APP_URL}/api/internal/sync")

            echo "Sync attempt ${attempt}: ${response}"

            status=$(node -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data.status || 'unknown');" "${response}")
            reason=$(node -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data.reason || '');" "${response}")

            if [ "$status" = "completed" ]; then
              exit 0
            fi

            if [ "$status" != "running" ]; then
              echo "Unexpected sync response"
              exit 1
            fi

            if [ "$reason" = "sync-already-running" ]; then
              echo "Sync pass is still holding the advisory lock. Waiting 10 seconds before retrying."
              sleep 10
              continue
            fi

            sleep 2
          done

          echo "Sync did not finish before the workflow deadline."
          exit 1

      - name: Run cleanup until retention work is idle
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"

          cleanup_deadline=$(( $(date +%s) + 180 ))
          attempt=0

          while [ "$(date +%s)" -lt "$cleanup_deadline" ]; do
            attempt=$((attempt + 1))

            response=$(curl --show-error --silent --fail-with-body \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              "${APP_URL}/api/internal/sync/cleanup")

            echo "Cleanup attempt ${attempt}: ${response}"

            status=$(node -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data.status || 'unknown');" "${response}")

            if [ "$status" = "idle" ]; then
              exit 0
            fi

            if [ "$status" != "working" ] && [ "$status" != "busy" ]; then
              echo "Unexpected cleanup response"
              exit 1
            fi

            sleep 10
          done

          echo "Cleanup did not settle before the workflow deadline."
          exit 1
